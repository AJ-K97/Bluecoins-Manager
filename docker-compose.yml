version: '3.8'

services:
  db:
    image: postgres:16
    container_name: bluecoins_db
    environment:
      POSTGRES_USER: bluecoins_user
      POSTGRES_PASSWORD: bluecoins_password
      POSTGRES_DB: bluecoins_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Optional web interface for managing Postgres
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  db_data:
